<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Advanced Monitor</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            max-width: 1400px;
            width: 100%;
        }

        @media (max-width: 1024px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--panel-bg);
            border-radius: 1.5rem;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .video-feed {
            width: 100%;
            max-width: 640px;
            border-radius: 1rem;
            border: 2px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            object-fit: cover;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            width: 100%;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-size: 3rem;
            font-weight: bold;
            display: block;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .attentive-text { color: #4ade80; }
        .confused-text { color: #f87171; }
        .percent-text { color: #facc15; }

        .chart-container {
            width: 100%;
            height: 300px;
            position: relative;
        }
        
        .alert-box {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 0.5rem;
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
            border: 1px solid #f87171;
            display: none;
            width: 100%;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🎓 NextGen Classroom Monitor</h1>

    <div class="dashboard-container">
        <!-- Left Panel: Video -->
        <div class="panel">
            <h2 style="margin-top: 0; color: var(--text-muted);">Live Feed</h2>
            <img class="video-feed" src="/video" alt="Classroom feed">
        </div>

        <!-- Right Panel: Analytics -->
        <div class="panel">
            <h2 style="margin-top: 0; color: var(--text-muted);">Real-Time Analytics</h2>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-value attentive-text" id="attentive">0</span>
                    <span class="stat-label">Attentive</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value confused-text" id="confused">0</span>
                    <span class="stat-label">Confused</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value percent-text"><span id="percent">0</span>%</span>
                    <span class="stat-label">Confusion Level</span>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="attentionChart"></canvas>
            </div>
            
            <div class="alert-box" id="alertBox">⚠️ High Confusion Detected!</div>
        </div>
    </div>

    <script>
        // Initialize Chart.js
        const ctx = document.getElementById('attentionChart').getContext('2d');
        
        // Gradient for chart
        const gradientConfused = ctx.createLinearGradient(0, 0, 0, 400);
        gradientConfused.addColorStop(0, 'rgba(248, 113, 113, 0.5)');
        gradientConfused.addColorStop(1, 'rgba(248, 113, 113, 0.0)');

        const attentionChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 20}, (_, i) => ''),
                datasets: [{
                    label: 'Confusion %',
                    data: Array(20).fill(0),
                    borderColor: '#f87171',
                    backgroundColor: gradientConfused,
                    borderWidth: 3,
                    pointRadius: 0,
                    pointHoverRadius: 6,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 0 },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        backgroundColor: 'rgba(15, 23, 42, 0.9)',
                        titleColor: '#f8fafc',
                        bodyColor: '#f8fafc',
                        borderColor: 'rgba(255,255,255,0.1)',
                        borderWidth: 1
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: { color: '#94a3b8' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { display: false }
                    }
                }
            }
        });

        // Update loop
        setInterval(() => {
            fetch('/stats')
                .then(res => res.json())
                .then(data => {
                    // Update stats
                    document.getElementById('confused').innerText = data.confused;
                    document.getElementById('attentive').innerText = data.attentive;
                    document.getElementById('percent').innerText = data.confusion;
                    
                    // Alert handling
                    const alertBox = document.getElementById('alertBox');
                    if(data.alert) {
                        alertBox.style.display = 'block';
                        alertBox.innerText = '⚠️ ' + data.alert;
                    } else {
                        alertBox.style.display = 'none';
                    }

                    // Update chart efficiently
                    if(data.history && data.history.length > 0) {
                        attentionChart.data.datasets[0].data = data.history;
                        attentionChart.update();
                    }
                })
                .catch(err => console.error("Error fetching stats:", err));
        }, 1000);
    </script>
</body>
</html>
